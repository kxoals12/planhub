spring:
  application:
    name: planhub

  datasource:
    url: jdbc:h2:mem:planhub;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: 1234

server:
  port: ${PORT:8080}  # Cloud Run이 주는 PORT 환경변수를 쓰고, 없으면 8080을 기본값으로 사용

neis:
  api:
    school-key: ${NEIS_SCHOOL_KEY}
    meal-key: ${NEIS_MEAL_KEY}
    timetable-key: ${NEIS_TIMETABLE_KEY}